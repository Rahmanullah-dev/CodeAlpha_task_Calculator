<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Professional Calculator | HTML + CSS + JS</title>
    
    <!-- Link to CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <!-- DISPLAY SCREEN -->
        <div class="display">
            <div class="expression" id="expressionPreview"></div>
            <div class="current-input" id="displayMain">0</div>
        </div>

        <!-- BUTTONS GRID -->
        <div class="buttons">
            <!-- Row 1 -->
            <button class="clear" data-action="clear">AC</button>
            <button class="delete" data-action="delete">⌫</button>
            <button class="operator" data-op="/">÷</button>
            <button class="operator" data-op="*">×</button>

            <!-- Row 2 -->
            <button data-num="7">7</button>
            <button data-num="8">8</button>
            <button data-num="9">9</button>
            <button class="operator" data-op="-">−</button>

            <!-- Row 3 -->
            <button data-num="4">4</button>
            <button data-num="5">5</button>
            <button data-num="6">6</button>
            <button class="operator" data-op="+">+</button>

            <!-- Row 4 -->
            <button data-num="1">1</button>
            <button data-num="2">2</button>
            <button data-num="3">3</button>
            <button class="equals" data-action="equals">=</button>

            <!-- Row 5 -->
            <button class="span-two" data-num="0">0</button>
            <button data-num=".">.</button>
        </div>

        <!-- KEYBOARD HINT -->
        <div class="key-hint">
            💡 <span>⌨️ Keyboard ready</span> → Numbers, operators (+, -, *, /), 
            <span>Enter</span> = result, <span>Backspace</span> = delete, 
            <span>Escape</span> = clear
        </div>
    </div>

    <!-- Link to JavaScript file (put at end for better performance) -->
    <script src="main.js"></script>
</body>
</html>
